<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM Profile Maker</title>

  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap)" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --card-bg: #0d0202;
      --card-border: #2e0909;
      --card-top-border: #7e1717;
      --card-text-white: #fff7f7;
      --card-text-body: #f0dddd;
      --card-text-soft: #efdddd;
      --card-stat-text: #fff5f5;
      --secret-accent: #ff2d2d;
      --tag-accent: #ff2d2d;
      --tag-border: #a31717;
      --physical-accent: #ff2d2d;
      --physical-border: #4a1212;
      --physical-bg: #180607;
      --physical-line: #ff2d2d;
      --relation-accent: #ff2d2d;
      --relation-border: #4a1212;
      --relation-bg: #180607;
      --relation-left-line: #ff2d2d;
      --skill-line-left: #df2020;
      --skill-line-right: #df2020;
      --skill-bg: #180607;
      --skill-border: #4a1212;
      --history-border: #4a1212;
      --history-line-left: #df2020;
      --history-line-right: #df2020;
      --history-bg: #180607;
      --stat-accent: #ff2d2d;
      --stat-border: #931818;
      --stat-bg: #180607;
      --favor-accent: #ff2d2d;
      --favor-border: #4a1212;
      --favor-bg: #180607;
      --hate-accent: #ff2d2d;
      --hate-border: #4a1212;
      --hate-bg: #180607;
    }

    html, body {
      margin: 0; padding: 0;
      background: #000000;
      color: #f3e9e9;
      font-family: "Noto Sans KR", sans-serif;
      min-height: 100vh;
    }

    .site-header {
      border-bottom: 1px solid rgba(255,60,60,0.15);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-header-inner {
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    .site-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff7f7;
    }

    .site-sub {
      margin-top: 6px;
      font-size: 13px;
      color: #caa8a8;
    }

    .layout {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      display: grid;
      grid-template-columns: 480px minmax(340px, 1fr);
      gap: 24px;
      align-items: start;
    }

    .editor {
      background: #120405;
      border: 1px solid #321010;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: sticky;
      top: 72px;
      max-height: calc(100vh - 92px);
      overflow-y: auto;
    }

    .editor h2 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #fff7f7;
    }

    .editor-desc {
      margin: 0 0 18px;
      font-size: 13px;
      line-height: 1.6;
      color: #caa8a8;
    }

    .form-section {
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid #431414;
      border-radius: 10px;
      background: #180607;
    }

    .form-section-title {
      margin: 0 0 12px;
      color: #ff2d2d;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .inline-color { margin-top: 8px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #f5dfdf;
    }

    input[type="text"],
    textarea,
    input[type="file"],
    input[type="color"] {
      width: 100%;
      border: 1px solid #5c1818;
      background: #0f0303;
      color: #f5e8e8;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
    }

    input[type="color"] {
      padding: 6px;
      height: 44px;
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    input[type="file"] { padding: 8px; }

    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .color-row .color-cell label { font-size: 11px; }

    .action-row {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .action-button {
      width: 100%;
      border: 1px solid #5c1818;
      background: linear-gradient(to bottom, rgba(255,45,45,0.16), rgba(255,45,45,0.08));
      color: #fff5f5;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .action-button:hover { filter: brightness(1.12); }
    .action-button:active { transform: translateY(1px); }

    .action-status {
      margin-top: 10px;
      font-size: 12px;
      color: #caa8a8;
      min-height: 18px;
    }

    .preview-area {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 380px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-top: 1px solid var(--card-top-border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,40,40,0.04),
        0 0 40px rgba(0,0,0,0.6);
    }

    /* 3:4 비율 이미지 영역 */
    .hero {
      position: relative;
      width: 100%;
      height: 424px;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.00) 0%,
          rgba(0,0,0,0.05) 50%,
          rgba(10,1,2,0.75) 82%,
          rgba(13,2,2,1.00) 100%
        ),
        url("data:image/svg+xml;utf8,<svg xmlns='[w3.org](http://www.w3.org/2000/svg)' width='318' height='424' viewBox='0 0 318 424'><rect width='318' height='424' fill='%23111111'/><text x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23888888' font-size='22' font-family='Arial'>3 : 4</text></svg>")
        center top / cover no-repeat;
    }

    .content {
      background: var(--card-bg);
      padding: 10px 14px 14px;
    }

    .secret {
      text-align: center;
      color: var(--secret-accent);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 2.6px;
      font-weight: 800;
      margin: 2px 0 10px;
    }

    .codename {
      margin: 0;
      text-align: center;
      color: var(--card-text-white);
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: 1.1px;
      font-weight: 300;
      text-shadow:
        0 0 4px rgba(255,255,255,0.2),
        0 0 10px rgba(255,60,60,0.35),
        0 0 18px rgba(255,60,60,0.22);
    }

    .tag {
      display: table;
      margin: 11px auto 17px;
      padding: 6px 10px 5px;
      color: var(--tag-accent);
      border: 1px solid var(--tag-border);
      border-radius: 2px;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1.1px;
      background: rgba(255,0,0,0.02);
    }

    .panel {
      border-radius: 6px;
      padding: 12px 12px 13px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 0 1px rgba(255,30,30,0.015);
    }

    .panel-title {
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1.5px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .panel p {
      margin: 0;
      color: var(--card-text-body);
      font-size: 11px;
      line-height: 1.72;
      font-weight: 400;
      word-break: keep-all;
      white-space: pre-line;
    }

    .panel-physical {
      background: var(--physical-bg);
      border: 1px solid var(--physical-border);
    }

    .panel-physical .panel-title {
      color: var(--card-text-white);
      display: inline-block;
      margin-bottom: 8px;
      padding: 0 0 6px 0;
      border-bottom: 1px solid var(--physical-line);
    }

    .panel-relation {
      position: relative;
      background: var(--relation-bg);
      border: 1px solid var(--relation-border);
      border-left: 4px solid var(--relation-left-line);
      border-radius: 0 4px 4px 0;
      padding: 14px 16px 14px 22px;
      box-shadow: none;
    }

    .panel-relation .panel-title {
      color: var(--card-text-white);
      font-size: 11px;
      line-height: 1.4;
      letter-spacing: 0;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .panel-relation p {
      line-height: 1.95;
      font-size: 11px;
    }

    .panel-skill {
      background: transparent;
      border: none;
      padding: 0;
      margin-bottom: 12px;
      box-shadow: none;
    }

    .panel-history {
      background: var(--history-bg);
      border: 1px solid var(--history-border);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--stat-bg);
      border: 1px solid var(--stat-border);
      border-radius: 6px;
      min-height: 73px;
      text-align: center;
      padding: 11px 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      color: var(--stat-accent);
      font-size: 9px;
      line-height: 1;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stat-value {
      color: var(--card-stat-text);
      font-size: 12px;
      line-height: 1.25;
      font-weight: 500;
    }

    .section-head {
      margin: 14px 0 10px;
      font-size: 11px;
      line-height: 1.4;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--card-text-white);
    }

    .section-head::before,
    .section-head::after {
      content: "";
      display: block;
      height: 1px;
      flex-shrink: 0;
    }

    .section-head-skill::before {
      width: 28px;
      background: var(--skill-line-left);
    }

    .section-head-skill::after {
      flex: 1;
      background: var(--skill-line-right);
    }

    .section-head-history::before {
      width: 28px;
      background: var(--history-line-left);
    }

    .section-head-history::after {
      flex: 1;
      background: var(--history-line-right);
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 2px;
    }

    .mini {
      border-radius: 6px;
      padding: 11px 11px 12px;
      min-height: 82px;
    }

    .mini-title {
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .mini p {
      margin: 0;
      color: var(--card-text-soft);
      font-size: 11px;
      line-height: 1.68;
      word-break: keep-all;
      white-space: pre-line;
    }

    .mini-favor {
      background: var(--favor-bg);
      border: 1px solid var(--favor-border);
    }

    .mini-favor .mini-title { color: var(--favor-accent); }

    .mini-hate {
      background: var(--hate-bg);
      border: 1px solid var(--hate-border);
    }

    .mini-hate .mini-title { color: var(--hate-accent); }

    .copyright {
      text-align: center;
      color: var(--secret-accent);
      font-size: 9px;
      line-height: 1;
      letter-spacing: 2.2px;
      font-weight: 700;
      padding: 14px 0 16px;
      background: var(--card-bg);
    }

    .helper {
      margin-top: 14px;
      font-size: 12px;
      color: #b99595;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .editor { position: static; max-height: none; }
      .preview-area { justify-content: center; }
    }

    @media (max-width: 520px) {
      .layout { padding: 16px 12px 28px; }
      .site-header-inner { padding: 16px 12px; }
      .editor { padding: 14px; }
    }
  </style>

</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">PRISM PROFILE MAKER</h1>
      <div class="site-sub">입력한 내용을 바탕으로 오른쪽 프로필 카드가 실시간으로 바뀝니다.</div>
    </div>
  </header>

  <main class="layout">
    <section class="editor">
      <h2>프로필 편집기</h2>
      <p class="editor-desc">코드네임, 각 박스 내용, 색상을 설정할 수 있습니다.</p>

  <div class="action-row">
    <button type="button" class="action-button" id="savePngButton">PNG 저장</button>
    <div class="action-status" id="actionStatus"></div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">색상 설정</h3>

    <div class="field">
      <label for="secretColorInput">상단 문구 색상</label>
      <input type="color" id="secretColorInput" value="#ff2d2d" />
    </div>

    <div class="field">
      <label for="tagColorInput">태그 색상</label>
      <input type="color" id="tagColorInput" value="#ff2d2d" />
    </div>

    <div class="field">
      <label for="textColorInput">본문 글자 색상</label>
      <input type="color" id="textColorInput" value="#f0dddd" />
    </div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">기본 정보</h3>

    <div class="field">
      <label for="imageInput">상단 이미지 업로드 (3:4 권장)</label>
      <input type="file" id="imageInput" accept="image/*" />
    </div>

    <div class="field">
      <label for="secretTextInput">상단 문구</label>
      <input type="text" id="secretTextInput" value="PRISM TOP SECRET ASSET" />
    </div>

    <div class="field">
      <label for="codenameInput">코드네임</label>
      <input type="text" id="codenameInput" value="" />
    </div>

    <div class="field">
      <label for="tagInput">태그</label>
      <input type="text" id="tagInput" value="" />
    </div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">외형 / 스탯</h3>

    <div class="field">
      <label for="physicalInput">PHYSICAL DESCRIPTION</label>
      <textarea id="physicalInput"></textarea>
      <div class="color-row">
        <div class="color-cell">
          <label for="physicalColorInput">텍스트·테두리·선</label>
          <input type="color" id="physicalColorInput" value="#ff2d2d" />
        </div>
        <div class="color-cell">
          <label for="physicalBgInput">박스 배경</label>
          <input type="color" id="physicalBgInput" value="#180607" />
        </div>
      </div>
    </div>

    <div class="field">
      <label for="ageInput">AGE / GEN</label>
      <input type="text" id="ageInput" value="" />
    </div>

    <div class="field">
      <label for="rankInput">RANK / TYPE</label>
      <input type="text" id="rankInput" value="" />
      <div class="color-row">
        <div class="color-cell">
          <label for="statColorInput">텍스트·테두리</label>
          <input type="color" id="statColorInput" value="#ff2d2d" />
        </div>
        <div class="color-cell">
          <label for="statBgInput">박스 배경</label>
          <input type="color" id="statBgInput" value="#180607" />
        </div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">관계 / 능력 / 서사</h3>

    <div class="field">
      <label for="relationTitleInput">관계 섹션 제목</label>
      <input type="text" id="relationTitleInput" value="" />
    </div>

    <div class="field">
      <label for="relationBodyInput">관계 섹션 본문</label>
      <textarea id="relationBodyInput"></textarea>
      <div class="color-row">
        <div class="color-cell">
          <label for="relationColorInput">테두리 색상</label>
          <input type="color" id="relationColorInput" value="#ff2d2d" />
        </div>
        <div class="color-cell">
          <label for="relationBgInput">박스 배경</label>
          <input type="color" id="relationBgInput" value="#180607" />
        </div>
      </div>
      <div class="inline-color">
        <label for="relationLeftLineInput">왼쪽 강조선 색상</label>
        <input type="color" id="relationLeftLineInput" value="#ff2d2d" />
      </div>
    </div>

    <div class="field">
      <label for="skillTitleInput">능력 섹션 제목</label>
      <input type="text" id="skillTitleInput" value="" />
      <div class="color-row">
        <div class="color-cell">
          <label for="skillLeftLineColorInput">왼쪽 선</label>
          <input type="color" id="skillLeftLineColorInput" value="#df2020" />
        </div>
        <div class="color-cell">
          <label for="skillRightLineColorInput">오른쪽 선</label>
          <input type="color" id="skillRightLineColorInput" value="#df2020" />
        </div>
      </div>
    </div>

    <div class="field">
      <label for="skillBodyInput">능력 섹션 본문</label>
      <textarea id="skillBodyInput"></textarea>
    </div>

    <div class="field">
      <label for="historyTitleInput">서사 섹션 제목</label>
      <input type="text" id="historyTitleInput" value="" />
      <div class="color-row">
        <div class="color-cell">
          <label for="historyLeftLineColorInput">왼쪽 선</label>
          <input type="color" id="historyLeftLineColorInput" value="#df2020" />
        </div>
        <div class="color-cell">
          <label for="historyRightLineColorInput">오른쪽 선</label>
          <input type="color" id="historyRightLineColorInput" value="#df2020" />
        </div>
      </div>
    </div>

    <div class="field">
      <label for="historyBodyInput">서사 본문</label>
      <textarea id="historyBodyInput"></textarea>
      <div class="color-row">
        <div class="color-cell">
          <label for="historyColorInput">테두리 색상</label>
          <input type="color" id="historyColorInput" value="#ff2d2d" />
        </div>
        <div class="color-cell">
          <label for="historyBgInput">박스 배경</label>
          <input type="color" id="historyBgInput" value="#180607" />
        </div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">기호</h3>

    <div class="field">
      <label for="favorInput">FAVOR</label>
      <textarea id="favorInput"></textarea>
      <div class="color-row">
        <div class="color-cell">
          <label for="favorColorInput">텍스트·테두리</label>
          <input type="color" id="favorColorInput" value="#ff2d2d" />
        </div>
        <div class="color-cell">
          <label for="favorBgInput">박스 배경</label>
          <input type="color" id="favorBgInput" value="#180607" />
        </div>
      </div>
    </div>

    <div class="field">
      <label for="hateInput">HATE</label>
      <textarea id="hateInput"></textarea>
      <div class="color-row">
        <div class="color-cell">
          <label for="hateColorInput">텍스트·테두리</label>
          <input type="color" id="hateColorInput" value="#ff2d2d" />
        </div>
        <div class="color-cell">
          <label for="hateBgInput">박스 배경</label>
          <input type="color" id="hateBgInput" value="#180607" />
        </div>
      </div>
    </div>
  </div>

  <p class="helper">이미지는 3:4 비율(예: 750×1000px)로 준비하면 가장 잘 맞습니다.</p>
</section>

<section class="preview-area">
  <div class="wrap">
    <div class="card" id="profileCard">
      <div class="hero" id="previewHero"></div>

      <div class="content">
        <div class="secret" id="previewSecret">PRISM TOP SECRET ASSET</div>
        <h1 class="codename" id="previewCodename"></h1>
        <div class="tag" id="previewTag"></div>

        <section class="panel panel-physical">
          <div class="panel-title">PHYSICAL DESCRIPTION</div>
          <p id="previewPhysical"></p>
        </section>

        <div class="stat-grid">
          <div class="stat">
            <div class="stat-label">AGE / GEN</div>
            <div class="stat-value" id="previewAge"></div>
          </div>
          <div class="stat">
            <div class="stat-label">RANK / TYPE</div>
            <div class="stat-value" id="previewRank"></div>
          </div>
        </div>

        <section class="panel panel-relation">
          <div class="panel-title" id="previewRelationTitle"></div>
          <p id="previewRelationBody"></p>
        </section>

        <div class="section-head section-head-skill" id="previewSkillTitle"></div>
        <section class="panel panel-skill">
          <p id="previewSkillBody"></p>
        </section>

        <div class="section-head section-head-history" id="previewHistoryTitle"></div>
        <section class="panel panel-history">
          <p id="previewHistoryBody"></p>
        </section>

        <div class="bottom-grid">
          <section class="mini mini-favor">
            <div class="mini-title">FAVOR</div>
            <p id="previewFavor"></p>
          </section>
          <section class="mini mini-hate">
            <div class="mini-title">HATE</div>
            <p id="previewHate"></p>
          </section>
        </div>
      </div>

      <div class="copyright">© PRISM FOUNDATION</div>
    </div>
  </div>
</section>

  </main>

  <script>
    function bindText(inputId, previewId) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      if (!input || !preview) return;
      const update = () => { preview.textContent = input.value; };
      input.addEventListener("input", update);
      update();
    }

    bindText("secretTextInput", "previewSecret");
    bindText("codenameInput",   "previewCodename");
    bindText("tagInput",        "previewTag");
    bindText("physicalInput",   "previewPhysical");
    bindText("ageInput",        "previewAge");
    bindText("rankInput",       "previewRank");
    bindText("relationTitleInput", "previewRelationTitle");
    bindText("relationBodyInput",  "previewRelationBody");
    bindText("skillTitleInput",    "previewSkillTitle");
    bindText("skillBodyInput",     "previewSkillBody");
    bindText("historyTitleInput",  "previewHistoryTitle");
    bindText("historyBodyInput",   "previewHistoryBody");
    bindText("favorInput",  "previewFavor");
    bindText("hateInput",   "previewHate");

    let uploadedImageDataUrl = null;

    document.getElementById("imageInput").addEventListener("change", function () {
      const file = this.files && this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedImageDataUrl = e.target.result;
        document.getElementById("previewHero").style.background =
          'linear-gradient(to bottom,rgba(0,0,0,0.00) 0%,rgba(0,0,0,0.05) 50%,rgba(10,1,2,0.75) 82%,rgba(13,2,2,1.00) 100%),url("' +
          uploadedImageDataUrl + '") center top / cover no-repeat';
      };
      reader.readAsDataURL(file);
    });

    const root = document.documentElement;

    function bindColor(inputId, cssVars) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const apply = () => cssVars.forEach(v => root.style.setProperty(v, input.value));
      input.addEventListener("input", apply);
      apply();
    }

    bindColor("textColorInput",   ["--card-text-body", "--card-text-soft"]);
    bindColor("secretColorInput", ["--secret-accent"]);
    bindColor("tagColorInput",    ["--tag-accent", "--tag-border"]);

    bindColor("physicalColorInput", ["--physical-accent", "--physical-border", "--physical-line"]);
    bindColor("physicalBgInput",    ["--physical-bg"]);

    bindColor("statColorInput", ["--stat-accent", "--stat-border"]);
    bindColor("statBgInput",    ["--stat-bg"]);

    bindColor("relationColorInput",   ["--relation-accent", "--relation-border"]);
    bindColor("relationBgInput",      ["--relation-bg"]);
    bindColor("relationLeftLineInput",["--relation-left-line"]);

    bindColor("skillLeftLineColorInput",  ["--skill-line-left"]);
    bindColor("skillRightLineColorInput", ["--skill-line-right"]);

    bindColor("historyColorInput", ["--history-border"]);
    bindColor("historyBgInput",    ["--history-bg"]);
    bindColor("historyLeftLineColorInput",  ["--history-line-left"]);
    bindColor("historyRightLineColorInput", ["--history-line-right"]);

    bindColor("favorColorInput", ["--favor-accent", "--favor-border"]);
    bindColor("favorBgInput",    ["--favor-bg"]);
    bindColor("hateColorInput",  ["--hate-accent", "--hate-border"]);
    bindColor("hateBgInput",     ["--hate-bg"]);

    document.getElementById("savePngButton").addEventListener("click", async () => {
      const status = document.getElementById("actionStatus");
      try {
        status.textContent = "PNG를 준비 중입니다...";
        await document.fonts.ready;

        const card = document.getElementById("profileCard");
        const SCALE = 2;
        const CARD_W = 318;
        const HERO_H = 424;
        const PAD_X  = 14;
        const INNER_W = CARD_W - PAD_X * 2;

        const getCSSVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
        const px = (n) => n * SCALE;

        const cardBg       = getCSSVar("--card-bg")          || "#0d0202";
        const textBody     = getCSSVar("--card-text-body")   || "#f0dddd";
        const textSoft     = getCSSVar("--card-text-soft")   || "#efdddd";
        const textWhite    = getCSSVar("--card-text-white")  || "#fff7f7";
        const statText     = getCSSVar("--card-stat-text")   || "#fff5f5";
        const secretAccent = getCSSVar("--secret-accent")    || "#ff2d2d";
        const tagAccent    = getCSSVar("--tag-accent")       || "#ff2d2d";
        const tagBorder    = getCSSVar("--tag-border")       || "#a31717";
        const physBorder   = getCSSVar("--physical-border")  || "#4a1212";
        const physBg       = getCSSVar("--physical-bg")      || "#180607";
        const physLine     = getCSSVar("--physical-line")    || "#ff2d2d";
        const statAccent   = getCSSVar("--stat-accent")      || "#ff2d2d";
        const statBorder   = getCSSVar("--stat-border")      || "#931818";
        const statBg       = getCSSVar("--stat-bg")          || "#180607";
        const relBorder    = getCSSVar("--relation-border")  || "#4a1212";
        const relBg        = getCSSVar("--relation-bg")      || "#180607";
        const relLeftLine  = getCSSVar("--relation-left-line") || "#ff2d2d";
        const skillLeftLine  = getCSSVar("--skill-line-left")  || "#df2020";
        const skillRightLine = getCSSVar("--skill-line-right") || "#df2020";
        const histBorder   = getCSSVar("--history-border")   || "#4a1212";
        const histBg       = getCSSVar("--history-bg")       || "#180607";
        const histLeftLine = getCSSVar("--history-line-left")  || "#df2020";
        const histRightLine= getCSSVar("--history-line-right") || "#df2020";
        const favorAccent  = getCSSVar("--favor-accent")     || "#ff2d2d";
        const favorBorder  = getCSSVar("--favor-border")     || "#4a1212";
        const favorBg      = getCSSVar("--favor-bg")         || "#180607";
        const hateAccent   = getCSSVar("--hate-accent")      || "#ff2d2d";
        const hateBorder   = getCSSVar("--hate-border")      || "#4a1212";
        const hateBg       = getCSSVar("--hate-bg")          || "#180607";

        const getValue = (id) => (document.getElementById(id) || {}).value || "";
        const secretText    = getValue("secretTextInput") || "PRISM TOP SECRET ASSET";
        const codenameText  = getValue("codenameInput");
        const tagText       = getValue("tagInput");
        const physicalText  = getValue("physicalInput");
        const ageText       = getValue("ageInput");
        const rankText      = getValue("rankInput");
        const relTitleText  = getValue("relationTitleInput");
        const relBodyText   = getValue("relationBodyInput");
        const skillTitleText= getValue("skillTitleInput");
        const skillBodyText = getValue("skillBodyInput");
        const histTitleText = getValue("historyTitleInput");
        const histBodyText  = getValue("historyBodyInput");
        const favorText     = getValue("favorInput");
        const hateText      = getValue("hateInput");

        const estH = HERO_H + 1200;
        const W = px(CARD_W);
        const H = px(estH);

        const canvas = document.createElement("canvas");
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = cardBg;
        ctx.fillRect(0, 0, W, H);

        if (uploadedImageDataUrl) {
          await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              const imgW = img.naturalWidth, imgH = img.naturalHeight;
              const targetW = px(CARD_W), targetH = px(HERO_H);
              const scale = Math.max(targetW / imgW, targetH / imgH);
              const dW = imgW * scale;
              const dH = imgH * scale;

              const dX = (targetW - dW) / 2;
              const dY = (targetH - dH) / 2;

              ctx.drawImage(img, dX, dY, dW, dH);
            
              resolve();
            };
            img.onerror = resolve;
            img.src = uploadedImageDataUrl;
          });
        } else {
          ctx.fillStyle = "#111111";
          ctx.fillRect(0, 0, px(CARD_W), px(HERO_H));
          ctx.fillStyle = "#888888";
          ctx.font = `${px(13)}px Arial`;
          ctx.textAlign = "center";
          ctx.fillText("3 : 4", px(CARD_W / 2), px(HERO_H / 2));
        }

        const heroGrad = ctx.createLinearGradient(0, 0, 0, px(HERO_H));
        heroGrad.addColorStop(0.00, "rgba(0,0,0,0.00)");
        heroGrad.addColorStop(0.50, "rgba(0,0,0,0.05)");
        heroGrad.addColorStop(0.82, "rgba(10,1,2,0.75)");
        heroGrad.addColorStop(1.00, "rgba(13,2,2,1.00)");
        ctx.fillStyle = heroGrad;
        ctx.fillRect(0, 0, px(CARD_W), px(HERO_H));

        function fillRoundRect(ctx, x, y, w, h, r, fill, stroke, lw) {
          const rx=px(x),ry=px(y),rw=px(w),rh=px(h),rr=px(r);
          ctx.beginPath();
          ctx.moveTo(rx+rr,ry); ctx.lineTo(rx+rw-rr,ry);
          ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+rr);
          ctx.lineTo(rx+rw,ry+rh-rr);
          ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-rr,ry+rh);
          ctx.lineTo(rx+rr,ry+rh);
          ctx.quadraticCurveTo(rx,ry+rh,rx,ry+rh-rr);
          ctx.lineTo(rx,ry+rr);
          ctx.quadraticCurveTo(rx,ry,rx+rr,ry);
          ctx.closePath();
          if (fill) { ctx.fillStyle=fill; ctx.fill(); }
          if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=lw||px(1); ctx.stroke(); }
        }

        function measureTextH(ctx, text, maxW, lineH, font) {
          ctx.font = font;
          let h = 0;
          for (const line of text.split("\n")) {
            if (!line.trim()) { h += lineH; continue; }
            let cur = "";
            for (const word of line.split(" ")) {
              const test = cur ? cur + " " + word : word;
              if (ctx.measureText(test).width > maxW && cur) { h += lineH; cur = word; }
              else cur = test;
            }
            h += lineH;
          }
          return h;
        }

        function drawText(ctx, text, x, y, maxW, lineH, color, font) {
          ctx.fillStyle = color; ctx.font = font;
          let cy = y;
          for (const line of text.split("\n")) {
            if (!line.trim()) { cy += lineH; continue; }
            let cur = "";
            for (const word of line.split(" ")) {
              const test = cur ? cur + " " + word : word;
              if (ctx.measureText(test).width > maxW && cur) {
                ctx.fillText(cur, x, cy); cy += lineH; cur = word;
              } else cur = test;
            }
            if (cur) { ctx.fillText(cur, x, cy); cy += lineH; }
          }
          return cy;
        }

        ctx.textAlign = "left";
        let curY = HERO_H + 10;

        ctx.font = `800 ${px(10)}px "Noto Sans KR",sans-serif`;
        ctx.textAlign = "center";
        ctx.fillStyle = secretAccent;
        ctx.fillText(secretText, px(CARD_W/2), px(curY+10));
        curY += 20;

        ctx.font = `300 ${px(24)}px "Noto Sans KR",sans-serif`;
        ctx.fillStyle = textWhite;
        ctx.fillText(codenameText, px(CARD_W/2), px(curY+24));
        curY += 32;

        if (tagText) {
          ctx.font = `400 ${px(10)}px "Noto Sans KR",sans-serif`;
          const tW = ctx.measureText(tagText).width + px(20);
          const tX = px(CARD_W/2) - tW/2;
          const tH = px(22);
          const tTop = px(curY);
          ctx.strokeStyle = tagBorder; ctx.lineWidth = px(1);
          ctx.strokeRect(tX, tTop, tW, tH);
          ctx.fillStyle = "rgba(255,0,0,0.02)";
          ctx.fillRect(tX, tTop, tW, tH);
          ctx.fillStyle = tagAccent;
          ctx.fillText(tagText, px(CARD_W/2), tTop+px(14));
          curY += 32;
        } else { curY += 10; }

        ctx.textAlign = "left";

        const bodyFont11 = `400 ${px(11)}px "Noto Sans KR",sans-serif`;
        const lineH11 = px(11)*1.72;

        function drawPhysPanel(x, y, w, body) {
          const textH = measureTextH(ctx, body, px(w-24), lineH11, bodyFont11);
          const pH = 12+10+8+8+(textH/SCALE)+13;
          fillRoundRect(ctx, x, y, w, pH, 6, physBg, physBorder, px(1));
          ctx.fillStyle = textWhite;
          ctx.font = `800 ${px(10)}px "Noto Sans KR",sans-serif`;
          ctx.fillText("PHYSICAL DESCRIPTION", px(x+12), px(y+22));
          const tw = ctx.measureText("PHYSICAL DESCRIPTION").width;
          ctx.strokeStyle = physLine; ctx.lineWidth = px(1);
          ctx.beginPath(); ctx.moveTo(px(x+12),px(y+30)); ctx.lineTo(px(x+12)+tw,px(y+30)); ctx.stroke();
          drawText(ctx, body, px(x+12), px(y+48), px(w-24), lineH11, textBody, bodyFont11);
          return y+pH+12;
        }
        curY = drawPhysPanel(PAD_X, curY, INNER_W, physicalText);

        const statW = (INNER_W-10)/2;
        function drawStat(label, val, x, y, w, h) {
          fillRoundRect(ctx, x, y, w, h, 6, statBg, statBorder, px(1));
          ctx.font = `700 ${px(9)}px "Noto Sans KR",sans-serif`;
          ctx.fillStyle = statAccent; ctx.textAlign = "center";
          ctx.fillText(label, px(x+w/2), px(y+22));
          ctx.font = `500 ${px(12)}px "Noto Sans KR",sans-serif`;
          ctx.fillStyle = statText;
          ctx.fillText(val, px(x+w/2), px(y+42));
          ctx.textAlign = "left";
        }
        drawStat("AGE / GEN",  ageText,  PAD_X,           curY, statW, 73);
        drawStat("RANK / TYPE",rankText, PAD_X+statW+10,  curY, statW, 73);
        curY += 73+12;

        function drawRelPanel(x, y, w, title, body) {
          const textH = measureTextH(ctx, body, px(w-38), lineH11, bodyFont11);
          const pH = 14+14+12+(textH/SCALE)+14;
          const rx=px(x), ry=px(y), rw=px(w), rh=px(pH), r=px(4);
          ctx.beginPath();
          ctx.moveTo(rx+px(4),ry); ctx.lineTo(rx+rw-r,ry);
          ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+r);
          ctx.lineTo(rx+rw,ry+rh-r);
          ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-r,ry+rh);
          ctx.lineTo(rx+px(4),ry+rh); ctx.lineTo(rx+px(4),ry); ctx.closePath();
          ctx.fillStyle = relBg; ctx.fill();
          ctx.strokeStyle = relBorder; ctx.lineWidth = px(1); ctx.stroke();
          ctx.fillStyle = relLeftLine;
          ctx.fillRect(rx, ry, px(4), rh);
          ctx.fillStyle = textWhite;
          ctx.font = `800 ${px(14)}px "Noto Sans KR",sans-serif`;
          ctx.fillText(title||"", px(x+16), px(y+22));
          drawText(ctx, body, px(x+16), px(y+42), px(w-32), lineH11, textBody, bodyFont11);
          return y+pH+14;
        }
        curY = drawRelPanel(PAD_X, curY, INNER_W, relTitleText, relBodyText);

        function drawSectionHead(x, y, w, title, lc, rc) {
          if (!title) return y;
          ctx.font = `700 ${px(11)}px "Noto Sans KR",sans-serif`;
          const tW = ctx.measureText(title).width;
          const lW=28, gap=10;
          const lineY=y+8;
          ctx.strokeStyle=lc; ctx.lineWidth=px(1);
          ctx.beginPath(); ctx.moveTo(px(x),px(lineY)); ctx.lineTo(px(x+lW),px(lineY)); ctx.stroke();
          ctx.fillStyle=textWhite;
          ctx.fillText(title, px(x+lW+gap), px(y+12));
          ctx.strokeStyle=rc;
          ctx.beginPath(); ctx.moveTo(px(x+lW+gap)+(tW),px(lineY)); ctx.lineTo(px(x+w),px(lineY)); ctx.stroke();
          return y+26;
        }

        curY = drawSectionHead(PAD_X, curY, INNER_W, skillTitleText, skillLeftLine, skillRightLine);
        if (skillBodyText) {
          curY = drawText(ctx, skillBodyText, px(PAD_X), px(curY+2), px(INNER_W), lineH11, textBody, bodyFont11)/SCALE+12;
        }

        curY = drawSectionHead(PAD_X, curY+4, INNER_W, histTitleText, histLeftLine, histRightLine);
        function drawHistPanel(x, y, w, body) {
          const textH = measureTextH(ctx, body, px(w-24), lineH11, bodyFont11);
          const pH = 12+(textH/SCALE)+13;
          fillRoundRect(ctx, x, y, w, pH, 6, histBg, histBorder, px(1));
          drawText(ctx, body, px(x+12), px(y+20), px(w-24), lineH11, textBody, bodyFont11);
          return y+pH+12;
        }
        curY = drawHistPanel(PAD_X, curY, INNER_W, histBodyText);

        const miniW = (INNER_W-10)/2;
        const lineH168 = px(11)*1.68;
        function drawMini(label, text, ac, bc, bg, x, y, w) {
          const textH = measureTextH(ctx, text, px(w-22), lineH168, bodyFont11);
          const pH = Math.max(82, 11+10+10+textH/SCALE+12);
          fillRoundRect(ctx, x, y, w, pH, 6, bg, bc, px(1));
          ctx.font = `800 ${px(10)}px "Noto Sans KR",sans-serif`;
          ctx.fillStyle = ac;
          ctx.fillText(label, px(x+11), px(y+21));
          drawText(ctx, text, px(x+11), px(y+34), px(w-22), lineH168, textSoft, bodyFont11);
          return y+pH+10;
        }

        const miniEndY = Math.max(
          drawMini("FAVOR", favorText, favorAccent, favorBorder, favorBg, PAD_X,         curY, miniW),
          drawMini("HATE",  hateText,  hateAccent,  hateBorder,  hateBg,  PAD_X+miniW+10, curY, miniW)
        );
        curY = miniEndY;

        ctx.fillStyle = cardBg;
        ctx.fillRect(0, px(curY), px(CARD_W), px(30));
        ctx.font = `700 ${px(9)}px "Noto Sans KR",sans-serif`;
        ctx.fillStyle = secretAccent; ctx.textAlign = "center";
        ctx.fillText("© PRISM FOUNDATION", px(CARD_W/2), px(curY+17));

        const finalH = px(curY+30);
        const out = document.createElement("canvas");
        out.width = W; out.height = finalH;
        out.getContext("2d").drawImage(canvas, 0, 0);

        const dataUrl = out.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = "prism-profile-card.png";
        document.body.appendChild(link);
        link.click();
        link.remove();

        status.textContent = "PNG 저장이 완료되었습니다.";
      } catch (err) {
        console.error(err);
        document.getElementById("actionStatus").textContent = "오류: " + err.message;
      }
    });
  </script>

</body>
