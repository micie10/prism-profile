<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM Profile Maker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --card-bg: #000000;
      --box-border: #333333;
      --card-text-white: #fff7f7;
      --card-text-body: #f0dddd;
      --card-text-soft: #efdddd;
      --card-stat-text: #fff5f5;
      --secret-accent: #ff2d2d;
      --tag-accent: #ff2d2d;
      --physical-line: #ff2d2d;
      --relation-left-line: #ff2d2d;
      --relation-title: #fff7f7;
      --relation-bg: transparent;
      --skill-line-left: #df2020;
      --skill-line-right: #df2020;
      --history-line-left: #df2020;
      --history-line-right: #df2020;
      --stat-accent: #ff2d2d;
      --favor-accent: #ff2d2d;
      --favor-bg: transparent;
      --hate-accent: #ff2d2d;
      --hate-bg: transparent;
    }

    html, body {
      margin: 0; padding: 0;
      background: #000000;
      color: #f3e9e9;
      font-family: "Noto Sans KR", sans-serif;
      min-height: 100vh;
    }

    .site-header {
      border-bottom: 1px solid rgba(255,60,60,0.15);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-header-inner {
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    .site-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff7f7;
    }

    .site-sub {
      margin-top: 6px;
      font-size: 13px;
      color: #caa8a8;
    }

    .layout {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      display: grid;
      grid-template-columns: 480px minmax(340px, 1fr);
      gap: 24px;
      align-items: start;
    }

    .editor {
      background: #120405;
      border: 1px solid #321010;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: sticky;
      top: 72px;
      max-height: calc(100vh - 92px);
      overflow-y: auto;
    }

    .editor h2 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #fff7f7;
    }

    .editor-desc {
      margin: 0 0 18px;
      font-size: 13px;
      line-height: 1.6;
      color: #caa8a8;
    }

    .form-section {
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid #431414;
      border-radius: 10px;
      background: #180607;
    }

    .form-section-title {
      margin: 0 0 12px;
      color: #ff2d2d;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .inline-color { margin-top: 8px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #f5dfdf;
    }

    input[type="text"],
    textarea,
    input[type="file"],
    input[type="color"] {
      width: 100%;
      border: 1px solid #5c1818;
      background: #0f0303;
      color: #f5e8e8;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
    }

    input[type="color"] {
      padding: 6px;
      height: 44px;
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    input[type="file"] { padding: 8px; }

    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .color-row .color-cell label { font-size: 11px; }

    .action-row {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .action-button {
      width: 100%;
      border: 1px solid #5c1818;
      background: linear-gradient(to bottom, rgba(255,45,45,0.16), rgba(255,45,45,0.08));
      color: #fff5f5;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .action-button:hover { filter: brightness(1.12); }
    .action-button:active { transform: translateY(1px); }

    .action-status {
      margin-top: 10px;
      font-size: 12px;
      color: #caa8a8;
      min-height: 18px;
    }

    .preview-area {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 380px;
      background: var(--card-bg);
      border: 1px solid var(--box-border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      isolation: isolate; 
    }

    /* 3:4 비율 이미지 영역 */
    .hero {
      position: relative;
      width: 100%;
      height: 424px;
      overflow: hidden;
      background: #000000;
      border-top-left-radius: 9px;
      border-top-right-radius: 9px;
      isolation: isolate; 
    }

    .hero-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #888888;
      font-size: 22px;
      font-family: Arial, sans-serif;
    }

    .hero-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      border-top-left-radius: 9px;
      border-top-right-radius: 9px;
    }

    .hero-gradient {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.00) 0%,
        rgba(0,0,0,0.05) 50%,
        rgba(10,1,2,0.75) 82%,
        rgba(0,0,0,1.00) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    .content {
      position: relative;
      background: var(--card-bg);
      padding: 10px 14px 14px;
      z-index: 3;
    }

    .secret {
      text-align: center;
      color: var(--secret-accent);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 2.6px;
      font-weight: 800;
      margin: 2px 0 10px;
    }

    .codename {
      margin: 0;
      text-align: center;
      color: var(--card-text-white);
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: 1.1px;
      font-weight: 300;
      text-shadow:
        0 0 4px rgba(255,255,255,0.2),
        0 0 10px rgba(255,60,60,0.35),
        0 0 18px rgba(255,60,60,0.22);
    }

    .tag {
      display: table;
      margin: 11px auto 17px;
      padding: 6px 10px 5px;
      color: var(--tag-accent);
      border: 1px solid var(--box-border);
      border-radius: 2px;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1.1px;
      background: rgba(255,0,0,0.02);
    }

    .panel {
      border-radius: 6px;
      padding: 12px 12px 13px;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1.5px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .panel p {
      margin: 0;
      color: var(--card-text-body);
      font-size: 11px;
      line-height: 1.72;
      font-weight: 400;
      word-break: break-all;
      white-space: pre-line;
    }

    .panel-physical {
      border: 1px solid var(--box-border);
    }

    .panel-physical .panel-title {
      color: var(--card-text-white);
      display: inline-block;
      margin-bottom: 8px;
      padding: 0 0 6px 0;
      border-bottom: 1px solid var(--physical-line);
    }

    .panel-relation {
      position: relative;
      border: 1px solid var(--box-border);
      border-left: 4px solid var(--relation-left-line);
      border-radius: 0 4px 4px 0;
      padding: 14px 16px 14px 22px;
      box-shadow: none;
      background: var(--relation-bg);
    }

    .panel-relation .panel-title {
      color: var(--relation-title);
      font-size: 11px;
      line-height: 1.4;
      letter-spacing: 0;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .panel-relation p {
      color: var(--relation-title);
      line-height: 1.95;
      font-size: 11px;
    }

    .panel-skill {
      background: transparent;
      border: none;
      padding: 0;
      margin-bottom: 12px;
      box-shadow: none;
    }

    .panel-history {
      border: 1px solid var(--box-border);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      border: 1px solid var(--box-border);
      border-radius: 6px;
      min-height: 73px;
      text-align: center;
      padding: 11px 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      color: var(--stat-accent);
      font-size: 9px;
      line-height: 1;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stat-value {
      color: var(--card-stat-text);
      font-size: 12px;
      line-height: 1.25;
      font-weight: 500;
    }

    .section-head {
      margin: 14px 0 10px;
      font-size: 11px;
      line-height: 1.4;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--card-text-white);
    }

    .section-head::before,
    .section-head::after {
      content: "";
      display: block;
      height: 1px;
      flex-shrink: 0;
    }

    .section-head-skill::before {
      width: 28px;
      background: var(--skill-line-left);
    }

    .section-head-skill::after {
      flex: 1;
      background: var(--skill-line-right);
    }

    .section-head-history::before {
      width: 28px;
      background: var(--history-line-left);
    }

    .section-head-history::after {
      flex: 1;
      background: var(--history-line-right);
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 2px;
    }

    .mini {
      border-radius: 6px;
      padding: 11px 11px 12px;
      min-height: 82px;
    }

    .mini-title {
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .mini p {
      margin: 0;
      color: var(--card-text-soft);
      font-size: 11px;
      line-height: 1.68;
      word-break: break-all;
      white-space: pre-line;
    }

    .mini-favor {
      border: 1px solid var(--box-border);
      background: var(--favor-bg);
    }

    .mini-favor .mini-title { color: var(--favor-accent); }
    .mini-favor p { color: var(--favor-accent); }

    .mini-hate {
      border: 1px solid var(--box-border);
      background: var(--hate-bg);
    }

    .mini-hate .mini-title { color: var(--hate-accent); }
    .mini-hate p { color: var(--hate-accent); }

    .copyright {
      text-align: center;
      color: var(--secret-accent);
      font-size: 9px;
      line-height: 1;
      letter-spacing: 2.2px;
      font-weight: 700;
      padding: 14px 0 16px;
      background: var(--card-bg);
    }

    .helper {
      margin-top: 14px;
      font-size: 12px;
      color: #b99595;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .editor { position: static; max-height: none; }
      .preview-area { justify-content: center; }
    }

    @media (max-width: 520px) {
      .layout { padding: 16px 12px 28px; }
      .site-header-inner { padding: 16px 12px; }
      .editor { padding: 14px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">PRISM PROFILE MAKER</h1>
      <div class="site-sub">입력한 내용을 바탕으로 오른쪽 프로필 카드가 실시간으로 바뀝니다.</div>
    </div>
  </header>

  <main class="layout">
    <section class="editor">
      <h2>프로필 편집기</h2>
      <p class="editor-desc">코드네임, 각 박스 내용, 색상을 설정할 수 있습니다.</p>

      <div class="action-row">
        <button type="button" class="action-button" id="savePngButton">PNG 저장</button>
        <div class="action-status" id="actionStatus"></div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">색상 설정</h3>

        <div class="field">
          <label for="secretColorInput">상단 문구 색상</label>
          <input type="color" id="secretColorInput" value="#ff2d2d" />
        </div>

        <div class="field">
          <label for="boxBorderColorInput">섹션 박스 테두리 색상</label>
          <input type="color" id="boxBorderColorInput" value="#333333" />
        </div>

        <div class="field">
          <label for="tagColorInput">태그 색상</label>
          <input type="color" id="tagColorInput" value="#ff2d2d" />
        </div>

        <div class="field">
          <label for="textColorInput">본문 글자 색상</label>
          <input type="color" id="textColorInput" value="#f0dddd" />
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">기본 정보</h3>

        <div class="field">
          <label for="imageInput">상단 이미지 업로드 (3:4 권장)</label>
          <input type="file" id="imageInput" accept="image/*" />
        </div>

        <div class="field">
          <label for="secretTextInput">상단 문구</label>
          <input type="text" id="secretTextInput" value="PRISM TOP SECRET ASSET" />
        </div>

        <div class="field">
          <label for="codenameInput">코드네임</label>
          <input type="text" id="codenameInput" value="" />
        </div>

        <div class="field">
          <label for="tagInput">태그</label>
          <input type="text" id="tagInput" value="" />
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">외형 / 스탯</h3>

        <div class="field">
          <label for="physicalInput">PHYSICAL DESCRIPTION</label>
          <textarea id="physicalInput"></textarea>
          <div class="inline-color">
            <label for="physicalColorInput">언더라인 색상</label>
            <input type="color" id="physicalColorInput" value="#ff2d2d" />
          </div>
        </div>

        <div class="field">
          <label for="ageInput">AGE / GEN</label>
          <input type="text" id="ageInput" value="" />
        </div>

        <div class="field">
          <label for="rankInput">RANK / TYPE</label>
          <input type="text" id="rankInput" value="" />
          <div class="inline-color">
            <label for="statColorInput">텍스트 색상</label>
            <input type="color" id="statColorInput" value="#ff2d2d" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">관계 / 능력 / 서사</h3>

        <div class="field">
          <label for="relationTitleInput">관계 섹션 제목</label>
          <input type="text" id="relationTitleInput" value="" />
        </div>

        <div class="field">
          <label for="relationBodyInput">관계 섹션 본문</label>
          <textarea id="relationBodyInput"></textarea>
          <div class="color-row">
            <div class="color-cell">
              <label for="relationTextColorInput">텍스트 색상</label>
              <input type="color" id="relationTextColorInput" value="#fff7f7" />
            </div>
            <div class="color-cell">
              <label for="relationLeftLineInput">왼쪽 강조선 색상</label>
              <input type="color" id="relationLeftLineInput" value="#ff2d2d" />
            </div>
          </div>
          <div class="inline-color" style="margin-top: 8px;">
            <label for="relationBgColorInput">관계 섹션 박스 배경색</label>
            <input type="color" id="relationBgColorInput" value="#000000" />
          </div>
        </div>

        <div class="field">
          <label for="skillTitleInput">능력 섹션 제목</label>
          <input type="text" id="skillTitleInput" value="" />
          <div class="color-row">
            <div class="color-cell">
              <label for="skillLeftLineColorInput">왼쪽 선</label>
              <input type="color" id="skillLeftLineColorInput" value="#df2020" />
            </div>
            <div class="color-cell">
              <label for="skillRightLineColorInput">오른쪽 선</label>
              <input type="color" id="skillRightLineColorInput" value="#df2020" />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="skillBodyInput">능력 섹션 본문</label>
          <textarea id="skillBodyInput"></textarea>
        </div>

        <div class="field">
          <label for="historyTitleInput">서사 섹션 제목</label>
          <input type="text" id="historyTitleInput" value="" />
          <div class="color-row">
            <div class="color-cell">
              <label for="historyLeftLineColorInput">왼쪽 선</label>
              <input type="color" id="historyLeftLineColorInput" value="#df2020" />
            </div>
            <div class="color-cell">
              <label for="historyRightLineColorInput">오른쪽 선</label>
              <input type="color" id="historyRightLineColorInput" value="#df2020" />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="historyBodyInput">서사 본문</label>
          <textarea id="historyBodyInput"></textarea>
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">기호</h3>

        <div class="field">
          <label for="favorInput">FAVOR</label>
          <textarea id="favorInput"></textarea>
          <div class="color-row">
            <div class="color-cell">
              <label for="favorColorInput">텍스트 색상</label>
              <input type="color" id="favorColorInput" value="#ff2d2d" />
            </div>
            <div class="color-cell">
              <label for="favorBgColorInput">박스 배경색</label>
              <input type="color" id="favorBgColorInput" value="#000000" />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="hateInput">HATE</label>
          <textarea id="hateInput"></textarea>
          <div class="color-row">
            <div class="color-cell">
              <label for="hateColorInput">텍스트 색상</label>
              <input type="color" id="hateColorInput" value="#ff2d2d" />
            </div>
            <div class="color-cell">
              <label for="hateBgColorInput">박스 배경색</label>
              <input type="color" id="hateBgColorInput" value="#000000" />
            </div>
          </div>
        </div>
      </div>

      <p class="helper">이미지는 3:4 비율(예: 750×1000px)로 준비하면 가장 잘 맞습니다.</p>
    </section>

    <section class="preview-area">
      <div class="wrap">
        <div class="card" id="profileCard">
          <div class="hero" id="previewHero">
            <span class="hero-placeholder" id="previewHeroPlaceholder">3 : 4</span>
            <img class="hero-img" id="previewHeroImg" alt="" />
            <div class="hero-gradient"></div>
          </div>

          <div class="content">
            <div class="secret" id="previewSecret">PRISM TOP SECRET ASSET</div>
            <h1 class="codename" id="previewCodename"></h1>
            <div class="tag" id="previewTag"></div>

            <section class="panel panel-physical">
              <div class="panel-title">PHYSICAL DESCRIPTION</div>
              <p id="previewPhysical"></p>
            </section>

            <div class="stat-grid">
              <div class="stat">
                <div class="stat-label">AGE / GEN</div>
                <div class="stat-value" id="previewAge"></div>
              </div>
              <div class="stat">
                <div class="stat-label">RANK / TYPE</div>
                <div class="stat-value" id="previewRank"></div>
              </div>
            </div>

            <section class="panel panel-relation">
              <div class="panel-title" id="previewRelationTitle"></div>
              <p id="previewRelationBody"></p>
            </section>

            <div class="section-head section-head-skill" id="previewSkillTitle"></div>
            <section class="panel panel-skill">
              <p id="previewSkillBody"></p>
            </section>

            <div class="section-head section-head-history" id="previewHistoryTitle"></div>
            <section class="panel panel-history">
              <p id="previewHistoryBody"></p>
            </section>

            <div class="bottom-grid">
              <section class="mini mini-favor">
                <div class="mini-title">FAVOR</div>
                <p id="previewFavor"></p>
              </section>
              <section class="mini mini-hate">
                <div class="mini-title">HATE</div>
                <p id="previewHate"></p>
              </section>
            </div>
          </div>

          <div class="copyright">© PRISM FOUNDATION</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    function bindText(inputId, previewId) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      if (!input || !preview) return;
      const update = () => { preview.textContent = input.value; };
      input.addEventListener("input", update);
      update();
    }

    bindText("secretTextInput", "previewSecret");
    bindText("codenameInput",   "previewCodename");
    bindText("tagInput",        "previewTag");
    bindText("physicalInput",   "previewPhysical");
    bindText("ageInput",        "previewAge");
    bindText("rankInput",       "previewRank");
    bindText("relationTitleInput", "previewRelationTitle");
    bindText("relationBodyInput",  "previewRelationBody");
    bindText("skillTitleInput",    "previewSkillTitle");
    bindText("skillBodyInput",     "previewSkillBody");
    bindText("historyTitleInput",  "previewHistoryTitle");
    bindText("historyBodyInput",   "previewHistoryBody");
    bindText("favorInput",  "previewFavor");
    bindText("hateInput",   "previewHate");

    let uploadedImageDataUrl = null;

    const HERO_BOX_W = 380;
    const HERO_BOX_H = 424;
    const HERO_CROP_SCALE = 2;
    const RADIUS_VAL = 9 * HERO_CROP_SCALE; 

    function cropImageToHeroBox(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const targetW = HERO_BOX_W * HERO_CROP_SCALE;
          const targetH = HERO_BOX_H * HERO_CROP_SCALE;
          const scale = Math.max(targetW / img.naturalWidth, targetH / img.naturalHeight);
          const dW = img.naturalWidth * scale;
          const dH = img.naturalHeight * scale;
          const dX = (targetW - dW) / 2;
          const dY = 0;                  
          
          const canvas = document.createElement("canvas");
          canvas.width = targetW;
          canvas.height = targetH;
          const ctx = canvas.getContext("2d");
          
          ctx.beginPath();
          ctx.moveTo(RADIUS_VAL, 0);
          ctx.lineTo(targetW - RADIUS_VAL, 0);
          ctx.quadraticCurveTo(targetW, 0, targetW, RADIUS_VAL);
          ctx.lineTo(targetW, targetH);
          ctx.lineTo(0, targetH);
          ctx.lineTo(0, RADIUS_VAL);
          ctx.quadraticCurveTo(0, 0, RADIUS_VAL, 0);
          ctx.closePath();
          ctx.clip(); 
          
          ctx.drawImage(img, dX, dY, dW, dH);
          resolve(canvas.toDataURL("image/png"));
        };
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    document.getElementById("imageInput").addEventListener("change", function () {
      const file = this.files && this.files[0];
      if (!file) return;
      const status = document.getElementById("actionStatus");
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const croppedDataUrl = await cropImageToHeroBox(e.target.result);
          uploadedImageDataUrl = croppedDataUrl;
          const img = document.getElementById("previewHeroImg");
          const placeholder = document.getElementById("previewHeroPlaceholder");
          img.src = croppedDataUrl;
          img.style.display = "block";
          placeholder.style.display = "none";
        } catch (err) {
          console.error(err);
          status.textContent = "이미지를 불러오지 못했습니다.";
        }
      };
      reader.readAsDataURL(file);
    });

    const root = document.documentElement;

    function bindColor(inputId, cssVars) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const apply = () => cssVars.forEach(v => root.style.setProperty(v, input.value));
      input.addEventListener("input", apply);
      apply();
    }

    bindColor("textColorInput",   ["--card-text-body", "--card-text-soft"]);
    bindColor("secretColorInput", ["--secret-accent"]);
    bindColor("boxBorderColorInput", ["--box-border"]);
    bindColor("tagColorInput",    ["--tag-accent"]);
    bindColor("physicalColorInput", ["--physical-line"]);
    bindColor("statColorInput", ["--stat-accent"]);
    bindColor("relationTextColorInput", ["--relation-title"]);
    bindColor("relationLeftLineInput", ["--relation-left-line"]);
    bindColor("relationBgColorInput", ["--relation-bg"]);
    bindColor("skillLeftLineColorInput",  ["--skill-line-left"]);
    bindColor("skillRightLineColorInput", ["--skill-line-right"]);
    bindColor("historyLeftLineColorInput",  ["--history-line-left"]);
    bindColor("historyRightLineColorInput", ["--history-line-right"]);
    bindColor("favorColorInput", ["--favor-accent"]);
    bindColor("favorBgColorInput", ["--favor-bg"]);
    bindColor("hateColorInput",  ["--hate-accent"]);
    bindColor("hateBgColorInput", ["--hate-bg"]);

    document.getElementById("savePngButton").addEventListener("click", async () => {
      const status = document.getElementById("actionStatus");
      const card = document.getElementById("profileCard");
      try {
        status.textContent = "PNG를 준비 중입니다...";
        await document.fonts.ready;

        const heroImg = document.getElementById("previewHeroImg");
        if (heroImg && heroImg.src && !heroImg.complete) {
          await new Promise((resolve) => {
            heroImg.onload = resolve;
            heroImg.onerror = resolve;
          });
        }

        // PC 브라우저 확대/축소 및 스크롤 위치 변수를 제거하고 카드 자체 크기(width: 380)만 정확하게 타겟팅
        const canvas = await html2canvas(card, {
          scale: 2,
          backgroundColor: "#000000",
          useCORS: true,
          logging: false,
          width: 380, // 고정 규격으로 강제 차단
          windowWidth: 380,
          scrollX: 0,
          scrollY: 0,
          x: 0,
          y: 0
        });

        const dataUrl = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = "prism-profile-card.png";
        document.body.appendChild(link);
        link.click();
        link.remove();

        status.textContent = "PNG 저장이 완료되었습니다.";
      } catch (err) {
        console.error(err);
        status.textContent = "오류: " + err.message;
      }
    });
  </script>
</body>
</html>
