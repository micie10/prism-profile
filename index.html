<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM Profile Maker</title>
  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap)" rel="stylesheet">
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js)"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-main: #070707;
      --bg-grad-top: rgba(120, 20, 20, 0.15);
      --bg-grad-bottom: #050505;

      --editor-bg: #120405;
      --editor-border: #321010;
      --section-bg: #180607;
      --section-border: #431414;

      --card-bg: #120304;
      --card-border: #2e0909;
      --card-top-border: #7e1717;

      --panel-bg: #180607;
      --panel-border: #4a1212;
      --stat-border: #931818;

      --accent: #ff2d2d;
      --accent-soft: #a31717;
      --accent-line: #df2020;

      --text-main: #f3e9e9;
      --text-soft: #caa8a8;
      --text-white: #fff7f7;
      --text-body: #f0dddd;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-main);
      color: var(--text-main);
      font-family: "Noto Sans KR", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, var(--bg-grad-top), transparent 25%),
        linear-gradient(to bottom, #0b0b0b, var(--bg-grad-bottom));
    }

    .site-header {
      border-bottom: 1px solid rgba(255, 60, 60, 0.15);
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(6px);
    }

    .site-header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    .site-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--text-white);
    }

    .site-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-soft);
    }

    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      display: grid;
      grid-template-columns: 420px minmax(340px, 1fr);
      gap: 24px;
      align-items: start;
    }

    .editor {
      background: var(--editor-bg);
      border: 1px solid var(--editor-border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      position: sticky;
      top: 20px;
    }

    .editor h2 {
      margin: 0 0 8px;
      font-size: 20px;
      color: var(--text-white);
    }

    .editor-desc {
      margin: 0 0 18px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-soft);
    }

    .form-section {
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid var(--section-border);
      border-radius: 10px;
      background: var(--section-bg);
    }

    .form-section-title {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #f5dfdf;
    }

    input[type="text"],
    textarea,
    input[type="file"],
    input[type="color"] {
      width: 100%;
      border: 1px solid #5c1818;
      background: #0f0303;
      color: #f5e8e8;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
    }

    input[type="color"] {
      padding: 6px;
      height: 44px;
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    input[type="file"] {
      padding: 8px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .action-button {
      width: 100%;
      border: 1px solid var(--accent-soft);
      background: linear-gradient(to bottom, rgba(255, 45, 45, 0.16), rgba(255, 45, 45, 0.08));
      color: #fff5f5;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .action-button:hover {
      filter: brightness(1.08);
    }

    .action-button:active {
      transform: translateY(1px);
    }

    .action-status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-soft);
      min-height: 18px;
    }

    .preview-area {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 318px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-top: 1px solid var(--card-top-border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 40, 40, 0.03),
        0 0 30px rgba(0, 0, 0, 0.45);
    }

    .hero {
      position: relative;
      width: 100%;
      height: 252px;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.00) 0%,
          rgba(0, 0, 0, 0.08) 55%,
          rgba(16, 3, 4, 0.72) 86%,
          rgba(16, 3, 4, 0.98) 100%
        ),
        url("[via.placeholder.com](https://via.placeholder.com/318x252/111111/888888?text=IMAGE)") center top / cover no-repeat;
    }

    .content {
      background: var(--card-bg);
      padding: 10px 14px 14px;
    }

    .secret {
      text-align: center;
      color: var(--accent);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 2.6px;
      font-weight: 800;
      margin: 2px 0 10px;
    }

    .name {
      margin: 0;
      text-align: center;
      color: var(--text-white);
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: 1.1px;
      font-weight: 300;
    }

    .tag {
      display: table;
      margin: 11px auto 17px;
      padding: 6px 10px 5px;
      color: var(--accent);
      border: 1px solid var(--accent-soft);
      border-radius: 2px;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1.1px;
      background: rgba(255, 0, 0, 0.02);
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 12px 12px 13px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 0 1px rgba(255, 30, 30, 0.015);
    }

    .panel-title {
      color: #fff8f8;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1.5px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .panel p {
      margin: 0;
      color: var(--text-body);
      font-size: 11px;
      line-height: 1.72;
      font-weight: 400;
      word-break: keep-all;
      white-space: pre-line;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--panel-bg);
      border: 1px solid var(--stat-border);
      border-radius: 6px;
      min-height: 73px;
      text-align: center;
      padding: 11px 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      color: var(--accent);
      font-size: 9px;
      line-height: 1;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stat-value {
      color: #fff5f5;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 500;
    }

    .section-head {
      margin: 14px 0 10px;
      padding-top: 8px;
      border-top: 1px solid var(--accent-line);
      color: #fff5f5;
      font-size: 11px;
      line-height: 1.4;
      font-weight: 700;
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 2px;
    }

    .mini {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 11px 11px 12px;
      min-height: 82px;
    }

    .mini-title {
      color: var(--accent);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 1px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .mini p {
      margin: 0;
      color: #efdddd;
      font-size: 11px;
      line-height: 1.68;
      word-break: keep-all;
      white-space: pre-line;
    }

    .copyright {
      text-align: center;
      color: var(--accent);
      font-size: 9px;
      line-height: 1;
      letter-spacing: 2.2px;
      font-weight: 700;
      padding: 14px 0 16px;
      background: var(--card-bg);
    }

    .helper {
      margin-top: 14px;
      font-size: 12px;
      color: #b99595;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .editor {
        position: static;
      }

      .preview-area {
        justify-content: center;
      }
    }

    @media (max-width: 520px) {
      .layout {
        padding: 16px 12px 28px;
      }

      .site-header-inner {
        padding: 16px 12px;
      }

      .editor {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">PRISM PROFILE MAKER</h1>
      <div class="site-sub">입력한 내용을 바탕으로 오른쪽 프로필 카드가 실시간으로 바뀝니다.</div>
    </div>
  </header>

  <main class="layout">
    <section class="editor">
      <h2>프로필 편집기</h2>
      <p class="editor-desc">
        원하는 항목을 입력하고 색상도 직접 바꿔보세요.
      </p>

      <div class="action-row">
        <button type="button" class="action-button" id="savePngButton">PNG 저장</button>
        <div class="action-status" id="actionStatus"></div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">색상 설정</h3>

        <div class="field">
          <label for="accentColorInput">포인트 색상</label>
          <input type="color" id="accentColorInput" value="#ff2d2d" />
        </div>

        <div class="field">
          <label for="cardBgInput">카드 배경 색상</label>
          <input type="color" id="cardBgInput" value="#120304" />
        </div>

        <div class="field">
          <label for="panelBgInput">박스 배경 색상</label>
          <input type="color" id="panelBgInput" value="#180607" />
        </div>

        <div class="field">
          <label for="textColorInput">본문 글자 색상</label>
          <input type="color" id="textColorInput" value="#f0dddd" />
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">기본 정보</h3>

        <div class="field">
          <label for="imageInput">상단 이미지 업로드</label>
          <input type="file" id="imageInput" accept="image/*" />
        </div>

        <div class="field">
          <label for="secretInput">상단 문구</label>
          <input type="text" id="secretInput" value="" />
        </div>

        <div class="field">
          <label for="nameInput">이름</label>
          <input type="text" id="nameInput" value="" />
        </div>

        <div class="field">
          <label for="tagInput">태그</label>
          <input type="text" id="tagInput" value="" />
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">외형 / 스탯</h3>

        <div class="field">
          <label for="physicalInput">PHYSICAL DESCRIPTION</label>
          <textarea id="physicalInput"></textarea>
        </div>

        <div class="field">
          <label for="ageInput">AGE / GEN</label>
          <input type="text" id="ageInput" value="" />
        </div>

        <div class="field">
          <label for="rankInput">RANK / TYPE</label>
          <input type="text" id="rankInput" value="" />
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">관계 / 능력 / 서사</h3>

        <div class="field">
          <label for="relationTitleInput">관계 섹션 제목</label>
          <input type="text" id="relationTitleInput" value="" />
        </div>

        <div class="field">
          <label for="relationBodyInput">관계 섹션 본문</label>
          <textarea id="relationBodyInput"></textarea>
        </div>

        <div class="field">
          <label for="skillTitleInput">능력 섹션 제목</label>
          <input type="text" id="skillTitleInput" value="" />
        </div>

        <div class="field">
          <label for="skillBodyInput">능력 섹션 본문</label>
          <textarea id="skillBodyInput"></textarea>
        </div>

        <div class="field">
          <label for="historyTitleInput">서사 섹션 제목</label>
          <input type="text" id="historyTitleInput" value="" />
        </div>

        <div class="field">
          <label for="historyBodyInput">서사 본문</label>
          <textarea id="historyBodyInput"></textarea>
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section-title">기호</h3>

        <div class="field">
          <label for="favorInput">FAVOR</label>
          <textarea id="favorInput"></textarea>
        </div>

        <div class="field">
          <label for="hateInput">HATE</label>
          <textarea id="hateInput"></textarea>
        </div>
      </div>

      <p class="helper">
        빈칸으로 두면 오른쪽 카드에도 비어 있는 상태로 표시됩니다.
      </p>
    </section>

    <section class="preview-area">
      <div class="wrap">
        <div class="card" id="profileCard">
          <div class="hero" id="previewHero"></div>

          <div class="content">
            <div class="secret" id="previewSecret"></div>

            <h1 class="name" id="previewName"></h1>

            <div class="tag" id="previewTag"></div>

            <section class="panel">
              <div class="panel-title">PHYSICAL DESCRIPTION</div>
              <p id="previewPhysical"></p>
            </section>

            <div class="stat-grid">
              <div class="stat">
                <div class="stat-label">AGE / GEN</div>
                <div class="stat-value" id="previewAge"></div>
              </div>

              <div class="stat">
                <div class="stat-label">RANK / TYPE</div>
                <div class="stat-value" id="previewRank"></div>
              </div>
            </div>

            <section class="panel">
              <div class="panel-title" id="previewRelationTitle"></div>
              <p id="previewRelationBody"></p>
            </section>

            <div class="section-head" id="previewSkillTitle"></div>

            <section class="panel">
              <p id="previewSkillBody"></p>
            </section>

            <div class="section-head" id="previewHistoryTitle"></div>

            <section class="panel">
              <p id="previewHistoryBody"></p>
            </section>

            <div class="bottom-grid">
              <section class="mini">
                <div class="mini-title">FAVOR</div>
                <p id="previewFavor"></p>
              </section>

              <section class="mini">
                <div class="mini-title">HATE</div>
                <p id="previewHate"></p>
              </section>
            </div>
          </div>

          <div class="copyright">© PRISM FOUNDATION</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const bindText = (inputId, previewId) => {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);

      const update = () => {
        preview.textContent = input.value;
      };

      input.addEventListener("input", update);
      update();
    };

    bindText("secretInput", "previewSecret");
    bindText("nameInput", "previewName");
    bindText("tagInput", "previewTag");
    bindText("physicalInput", "previewPhysical");
    bindText("ageInput", "previewAge");
    bindText("rankInput", "previewRank");
    bindText("relationTitleInput", "previewRelationTitle");
    bindText("relationBodyInput", "previewRelationBody");
    bindText("skillTitleInput", "previewSkillTitle");
    bindText("skillBodyInput", "previewSkillBody");
    bindText("historyTitleInput", "previewHistoryTitle");
    bindText("historyBodyInput", "previewHistoryBody");
    bindText("favorInput", "previewFavor");
    bindText("hateInput", "previewHate");

    const imageInput = document.getElementById("imageInput");
    const previewHero = document.getElementById("previewHero");

    imageInput.addEventListener("change", function () {
      const file = this.files && this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        previewHero.style.background =
          'linear-gradient(to bottom, rgba(0, 0, 0, 0.00) 0%, rgba(0, 0, 0, 0.08) 55%, rgba(16, 3, 4, 0.72) 86%, rgba(16, 3, 4, 0.98) 100%), url("' +
          e.target.result +
          '") center top / cover no-repeat';
      };
      reader.readAsDataURL(file);
    });

    const root = document.documentElement;

    const accentColorInput = document.getElementById("accentColorInput");
    const cardBgInput = document.getElementById("cardBgInput");
    const panelBgInput = document.getElementById("panelBgInput");
    const textColorInput = document.getElementById("textColorInput");

    accentColorInput.addEventListener("input", function () {
      root.style.setProperty("--accent", this.value);
      root.style.setProperty("--accent-line", this.value);
      root.style.setProperty("--accent-soft", this.value);
      root.style.setProperty("--card-top-border", this.value);
      root.style.setProperty("--stat-border", this.value);
    });

    cardBgInput.addEventListener("input", function () {
      root.style.setProperty("--card-bg", this.value);
      root.style.setProperty("--editor-bg", this.value);
    });

    panelBgInput.addEventListener("input", function () {
      root.style.setProperty("--panel-bg", this.value);
      root.style.setProperty("--section-bg", this.value);
    });

    textColorInput.addEventListener("input", function () {
      root.style.setProperty("--text-body", this.value);
    });

    const savePngButton = document.getElementById("savePngButton");
    const actionStatus = document.getElementById("actionStatus");
    const profileCard = document.getElementById("profileCard");

    savePngButton.addEventListener("click", async () => {
      try {
        actionStatus.textContent = "PNG를 저장하는 중입니다...";

        const canvas = await html2canvas(profileCard, {
          backgroundColor: null,
          scale: 2,
          useCORS: true
        });

        const link = document.createElement("a");
        link.download = "prism-profile-card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();

        actionStatus.textContent = "PNG 저장이 완료되었습니다.";
      } catch (error) {
        actionStatus.textContent = "PNG 저장 중 오류가 발생했습니다.";
        console.error(error);
      }
    });
  </script>
</body>
</html>
